<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVE — Live</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 200;
      letter-spacing: 0.5em;
      color: #a78bfa;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(167,139,250,0.3);
    }
    .status {
      color: #666;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    .status.connected { color: #22c55e; }
    .status.error { color: #ef4444; }
    .status.mic-on { color: #a78bfa; }
    #video-container {
      width: 560px;
      height: 560px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(167,139,250,0.3);
      box-shadow: 0 0 60px rgba(167,139,250,0.15);
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .controls {
      margin-top: 1rem;
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }
    button {
      background: #4c1d95;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.5rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #5b21b6; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.mic-active {
      background: #dc2626;
      animation: pulse 1.5s infinite;
    }
    button.mic-btn {
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.4rem;
      padding: 0;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(220,38,38,0); }
    }
    .chat-box {
      margin-top: 1rem;
      width: 560px;
      display: flex;
      gap: 0.5rem;
    }
    .chat-box input {
      flex: 1;
      background: #1a1a24;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
    }
    .chat-box input:focus { border-color: #a78bfa; }
    .info {
      margin-top: 0.8rem;
      font-size: 0.7rem;
      color: #444;
      text-align: center;
    }
    .mic-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
      margin-right: 6px;
    }
    .mic-indicator.active { background: #22c55e; animation: pulse 1s infinite; }
  </style>
</head>
<body>
  <h1>E V E</h1>
  <div id="status" class="status">Connecting...</div>
  <div id="video-container">
    <span style="color:#444">Waiting for stream...</span>
  </div>
  <div class="controls">
    <button id="mic-btn" class="mic-btn" onclick="toggleMic()" title="Hold to talk">🎤</button>
    <button id="disconnect-btn" onclick="disconnect()" disabled>Disconnect</button>
    <span id="mic-status" style="font-size:0.8rem;color:#666;">
      <span class="mic-indicator" id="mic-dot"></span>Mic off
    </span>
  </div>
  <div class="chat-box">
    <input type="text" id="chat-input" placeholder="Type to Eve..." onkeydown="if(event.key==='Enter')sendText()">
    <button onclick="sendText()">Send</button>
  </div>
  <div class="info">
    LiveKit WebRTC | bitHuman Neural Render | EDEN OS V2
  </div>

  <script>
    const LIVEKIT_URL = 'wss://tall-cotton-nvhnfg10.livekit.cloud';
    let room = null;
    let micEnabled = false;
    let localAudioTrack = null;

    async function getToken() {
      const resp = await fetch('http://localhost:8000/livekit-token');
      const data = await resp.json();
      return data.token;
    }

    async function connectToEve() {
      const statusEl = document.getElementById('status');
      const container = document.getElementById('video-container');
      statusEl.textContent = 'Connecting to Eve...';
      statusEl.className = 'status';

      try {
        const token = await getToken();

        room = new LivekitClient.Room({
          adaptiveStream: true,
          dynacast: true,
          audioCaptureDefaults: {
            autoGainControl: true,
            echoCancellation: true,
            noiseSuppression: true,
          },
        });

        room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
          console.log('Track:', track.kind, participant.identity);
          if (track.kind === 'video') {
            const el = track.attach();
            el.style.width = '100%';
            el.style.height = '100%';
            el.style.objectFit = 'cover';
            container.innerHTML = '';
            container.appendChild(el);
          }
          if (track.kind === 'audio') {
            const el = track.attach();
            document.body.appendChild(el);
          }
        });

        room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
          track.detach().forEach(el => el.remove());
        });

        room.on(LivekitClient.RoomEvent.Connected, () => {
          statusEl.textContent = 'Connected — Eve is live';
          statusEl.className = 'status connected';
          document.getElementById('disconnect-btn').disabled = false;
        });

        room.on(LivekitClient.RoomEvent.Disconnected, () => {
          statusEl.textContent = 'Disconnected';
          statusEl.className = 'status';
          document.getElementById('disconnect-btn').disabled = true;
          container.innerHTML = '<span style="color:#444">Stream ended</span>';
        });

        await room.connect(LIVEKIT_URL, token);

        // Auto-enable mic after connecting
        await enableMic();

      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
        statusEl.className = 'status error';
        console.error(err);
      }
    }

    async function enableMic() {
      if (!room) return;
      try {
        await room.localParticipant.setMicrophoneEnabled(true);
        micEnabled = true;
        document.getElementById('mic-btn').classList.add('mic-active');
        document.getElementById('mic-dot').classList.add('active');
        document.getElementById('mic-status').innerHTML =
          '<span class="mic-indicator active" id="mic-dot"></span>Mic live';
        document.getElementById('status').textContent = 'Connected — Mic ON — Talk to Eve';
        document.getElementById('status').className = 'status mic-on';
        console.log('Mic enabled');
      } catch (err) {
        console.error('Mic error:', err);
        document.getElementById('mic-status').innerHTML =
          '<span class="mic-indicator" id="mic-dot"></span>Mic denied';
      }
    }

    async function toggleMic() {
      if (!room) return;
      if (micEnabled) {
        await room.localParticipant.setMicrophoneEnabled(false);
        micEnabled = false;
        document.getElementById('mic-btn').classList.remove('mic-active');
        document.getElementById('mic-dot').classList.remove('active');
        document.getElementById('mic-status').innerHTML =
          '<span class="mic-indicator" id="mic-dot"></span>Mic off';
        document.getElementById('status').textContent = 'Connected — Mic OFF';
        document.getElementById('status').className = 'status connected';
      } else {
        await enableMic();
      }
    }

    function sendText() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !room) return;

      // Send text via LiveKit data channel
      const encoder = new TextEncoder();
      room.localParticipant.publishData(encoder.encode(JSON.stringify({
        type: 'chat',
        text: text
      })), { reliable: true });

      input.value = '';
      console.log('Sent:', text);
    }

    function disconnect() {
      if (room) {
        room.disconnect();
        room = null;
        micEnabled = false;
      }
    }

    // AUTO-CONNECT + AUTO-MIC on load
    window.addEventListener('load', () => {
      setTimeout(connectToEve, 300);
    });
  </script>
</body>
</html>
